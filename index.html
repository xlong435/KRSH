<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRSH官方社区</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: 
                url("背景.webp") no-repeat center center fixed,
                radial-gradient(circle at 10% 10%, rgba(255,180,220,0.15) 0 8%, transparent 9%),
                radial-gradient(circle at 90% 18%, rgba(255,180,220,0.15) 0 10%, transparent 11%),
                radial-gradient(circle at 15% 85%, rgba(255,220,240,0.2) 0 9%, transparent 10%),
                radial-gradient(circle at 85% 90%, rgba(255,220,240,0.2) 0 11%, transparent 12%);
            background-color: #fff5f8;
            background-size: contain, 100% 100%, 100% 100%, 100% 100%, 100% 100%;
            min-height: 100vh;
            padding: 20px 15px;
        }
        .top-cat-box {
            width: 100%;
            text-align: center;
            margin-bottom: 40px;
        }
        .sleep-cat {
            width: 220px;
            max-width: 60%;
            filter: drop-shadow(0 4px 8px rgba(255,180,220,0.6));
        }
        .title-text {
            font-size: 36px;
            color: #ff6fb9;
            text-shadow: 2px 2px 0 #fff;
            text-align: center;
            margin: 10px 0 30px;
            font-weight: bold;
        }
        .member-wrap {
            max-width: 600px;
            margin: 0 auto 50px;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 24px;
            padding: 30px 20px;
            border: 3px solid #ffb6d2;
        }
        .member-title {
            font-size: 24px;
            color: #ff58a8;
            text-align: center;
            margin-bottom: 25px;
        }
        .member-item {
            font-size: 18px;
            color: #444;
            margin: 16px 0;
            padding-left: 12px;
            border-left: 4px solid #ff94c2;
        }
        .btn-wrap {
            text-align: center;
            margin: 30px 0;
        }
        .btn-text {
            font-size: 18px;
            color: #ff6fb9;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .btn-img {
            display: block;
            width: 52px;
            max-width: 18%;
            height: auto;
            margin: 0 auto;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .btn-img:hover {
            transform: scale(1.06);
        }
        .footer-box {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
        }
        .footer-tip {
            font-size: 21px;
            color: #ff4b9c;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
            margin-bottom: 15px;
            font-weight: bold;
        }
        /* 底部标语样式 */
        .slogan-text {
            text-align: center;
            margin-top: 80px;
            font-size: 16px;
            color: #ff58a8;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
            line-height: 1.8;
            font-weight: bold;
            padding-bottom: 40px;
        }
    </style>
</head>
<body>
    <div class="top-cat-box">
        <img src="sleepcat.webp" alt="趴着睡觉的小猫" class="sleep-cat">
        <h1 class="title-text">KRSH官方社区</h1>
    </div>

    <div class="member-wrap">
        <h2 class="member-title">🐱 KRSH 全体成员</h2>
        <div class="member-item">PHAGE-A ｜ 创始人</div>
        <div class="member-item">Jvmtu_OVO</div>
        <div class="member-item">codm空崎日奈</div>
    </div>

    <div class="btn-wrap">
        <p class="btn-text">加入空日噬魂</p>
        <a href="https://qm.qq.com/q/hhwa5gePYs" target="_blank">
            <img src="按键.webp" alt="一键加群" class="btn-img">
        </a>
    </div>

    <div class="footer-box">
        <p class="footer-tip">前往KRSH龙之谷分部</p>
        <a href="https://longvalley.cn" target="_blank">
            <img src="按键.webp" alt="前往龙之谷分部" class="btn-img">
        </a>
    </div>

    <!-- 新增底部文案 -->
    <p class="slogan-text">岁月有限，而星河永存。文明将终，唯有时间永恒</p>
</body>
</html>
